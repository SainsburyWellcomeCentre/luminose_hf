# Luminose Configuration File
# All parameters must be specified - no auto-detection or defaults

# Base paths
paths:
  parentFolder: "C:\\Users\\harrislab" 
  matlabFolder: "C:\\Users\\harrislab\\MATLAB"

# Bpod behavioral system configuration
bpod:
  protocols: "C:\\Users\\harrislab\\luminose_hf\\protocols"
  protocolFile: "luminose_hf_goNogo.m"
  dataPath: "C:\\Users\\harrislab\\luminoseData"
    
# Olfactometer configuration
olfactometer:
  # Timing parameters
  sampleRate: 10000
  pulseTime: 1
  backValveDelay: 0.05
  preSequenceTime: 0.001
  postSequenceTime: 0.001
  
  # Configuration files
  distanceFile: "C:\\Users\\harrislab\\luminose_hf\\olfactometer\\canberra_all.csv"
  mapFile: "C:\\Users\\harrislab\\luminose_hf\\olfactometer\\canberra_all_mds.csv"
  odourChemicalsFile: "C:\\Users\\harrislab\\luminose_hf\\olfactometer\\odour_chemicals.tsv"
  odourBottlesFile: "C:\\Users\\harrislab\\luminose_hf\\olfactometer\\odour_bottles.tsv"
  
  # Back valves configuration
  backValves:
    deviceID: "backValves"
    channelID: "port0/line0:7, port0/line16:23"
    measurementType: "Digital"
    channelCount: 16
  
  # Front valves configuration
  frontValves:
    deviceID: "frontValves"
    channelID: "port0/line0:15"
    measurementType: "Digital"
    channelCount: 16
  
  # Sync TTL configuration
  syncTTL:
    deviceID: "frontValves"
    channelID: "port0/line16:19"
    measurementType: "Digital"
    channelCount: 4
  
  # Input trigger configuration
  inputTrigger: "cDAQ1/PFI0"
  DigitalTriggerTimeout: 10

# DMD (Digital Micromirror Device) configuration
dmd:
  testImagePath: "C:\\Users\\harrislab\\Documents\\DLPimages\\bullseye1920x1080_inv.bmp"
  # projected width of the full 1024-DMD-px field at the sample plane (mm)
  # derived 20260701 from: 1mm = 634 camera-px (measured) combined with the
  # checkerboard_20260701_142601.mat DMD-to-camera ratio (avg row/col
  # 1.8145 camera-px/DMD-px) -> 2.8620 um/DMD-px * 1024 px = 2.9307mm
  # (replaces old 3.15mm placeholder — see calibrate_xy_checkerboard.m)
  projectedDMDlength: 2.9307
  spotSide: 0.1
  patternsFolder: "C:\\Users\\harrislab\\luminose_hf\\dmd\\Patterns"

# OBIS laser remote configuration
laser:
  port: "COM15"
  baudRate: 115200
  maxPower_mW: 165

# Hamamatsu ORCA-Flash4.0 LT3 camera configuration
camera:
  adaptorName: "hamamatsu"
  adaptorDllPath: "C:\\Users\\harrislab\\AppData\\Roaming\\MathWorks\\MATLAB Add-Ons\\Toolboxes\\Hamamatsu Image Acquisition\\hamamatsu.dll"
  deviceID: 1
  exposureTime_ms: 2
  nAverageFrames: 5
  # physical pixel size on sensor (um) — from manufacturer
  pixelSize_um: 6.5
  # effective pixel size at sample plane (um) — measured directly (1mm = 634 camera-px, 20260701)
  effectivePixelSize_um: 1.5773

# Zaber 3-axis stage configuration
zaber:
  port: "COM14"
  axisIndex: 1        # Z axis index (1-based)
  zRange_um: [-500, 500]
  zStep_um: 50

# Bonsai workflow configuration
bonsai:
  launch_bonsai: false
  exePath: "C:\\Users\\harrislab\\AppData\\Local\\Bonsai\\bonsai.exe"
  # exePath: "/home/username/.local/share/Bonsai/bonsai"  # Linux/Mac example
  workflowPath: "C:\\Users\\harrislab\\luminose_hf\\bonsai\\BehaviourCamerasAcquisition.bonsai"